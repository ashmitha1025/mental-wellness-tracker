<!DOCTYPE html>
<html>
<head>
<title>Journal</title>

<style>
body{
font-family:Arial;
background:#f1f5f9;
padding:40px;
}

.box{
background:white;
padding:20px;
width:500px;
margin:auto;
border-radius:10px;
}

textarea{
width:100%;
height:200px;
padding:10px;
}

button{
padding:10px;
width:100%;
background:#22c55e;
color:white;
border:none;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Daily Journal</h2>

<textarea id="content"></textarea>

<button onclick="saveJournal()">Save</button>

<br><br>

<a href="analytics.html">Analytics</a>

</div>

<script>

async function saveJournal(){

await fetch("http://localhost:5000/journal",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:localStorage.getItem("userId"),

content:content.value

})
});

alert("Journal Saved");
}

</script>

</body>
</html>
